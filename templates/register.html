<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <style>
      body {
        background: rgb(130, 38, 71);
      }

      .confirmation{
        background-color: white;
        width: 350px;
        height: 50vh;
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 15px;
        text-align: left;
        color: rgb(0, 0, 0);
        border: 3px black solid;
      }
      .form-container {
        background-color: white;
        width: 300px;
        height: 50vh;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 15px;
        text-align: center;
        color: rgb(147, 49, 85);
      }

      form {
        text-align: left;
        color: black;
        font-size: 18px;
      }
      form input {
        background-color: rgb(255, 234, 234);
        width: 95%;
        height: 1vh;
        border-radius: 18px;
        padding: 10px;
        font-size: 16px;
        font-weight: 500;
        border: 2px rgb(173, 173, 173) solid;
        transition: all 0.3s;
      }

      form input[type="password"] {
        width: 70%;
      }

      form input:hover {
        background-color: rgb(242, 200, 200);

        height: 3vh;
        border-radius: 18px;
        padding: 10px;
        font-size: 16px;
        font-weight: 500;
        border: 2px rgb(255, 0, 89) solid;
      }

      form input[type="password"]:hover {
        width: 80%;
      }

      #show {
        width: 20%;
        height: 5vh;
        border-radius: 10px;
        background-color: rgb(147, 42, 165);
        border: none;
        color: white;
        transition: all 0.3s;
      }

      #show:hover {
        width: 18%;
        height: 5vh;
        border-radius: 10px;
        background-color: rgb(255, 255, 255);
        border: none;
        color: rgb(182, 105, 255);
        border: 1.5px rgb(182, 105, 255) solid;
      }

      #edit{
        width: 20%;
        height: 5vh;
        border-radius: 10px;
        background-color: rgb(216, 92, 238);
        border: none;
        color: white;
        transition: all 0.3s;
        margin-right: 10px;
      }
      #edit:hover {
        width: 20%;
        height: 5vh;
        border-radius: 10px;
        background-color: rgb(255, 255, 255);
        border: none;
        color: rgb(182, 105, 255);
        border: 1.5px rgb(182, 105, 255) solid;
      }
      #confirm{
       
        width: 20%;
        height: 5vh;
        border-radius: 10px;
        background-color: rgb(126, 15, 65);
        border: none;
        color: white;
        transition: all 0.3s;
        margin-right: 10px;
      }
      #confirm:hover {
        width: 20%;
        height: 5vh;
        border-radius: 10px;
        background-color: rgb(255, 255, 255);
        border: none;
        color: rgb(255, 105, 148);
        border: 1.5px rgb(255, 105, 110) solid;
      }
      #action {
        width: 40%;
        height: 5vh;
        border-radius: 10px;
        position: absolute;
        background-color: rgb(165, 42, 122);
        border: none;
        color: white;
        transition: all 0.3s;
        margin-bottom: 10px;
        bottom: 3%;
        left: 55%;
        transform: translate(-3%, -60%);
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>Create account</h2>
      <form action="/register" method="post" id="registerForm">
        <label for="user">Enter a username:</label>
        <br />
        <input type="text" required name="user" id="user" />
        <br />
        <label for="mail">Enter a email:</label>
        <br />
        <input type="email" required name="mail" id="mail" />
        <br />
        <label for="pass">Enter your password:</label>
        <br />
        <input type="password" required name="pass" id="pass" />

        <button type="button" id="show">Show</button>

        <br />
        <br />
        <button type="button" id="action" name="action" value="registerInto">
          Create Account
        </button>
      </form>
    </div>

    <div class="confirmation" id="pop-up">
      <h2>Confirme sus credenciales para crear la cuenta!</h2>
      <p><strong>Username: <p id="userValue"></p></strong></p>
      <p><strong>Email: <p id="mailValue"></p></strong></p>
      <p><strong>Password: <p id="passValue"></p></strong></p>
      
      <button id="edit">Editar</button><button type="submit" id="confirm" name="action" value="confirm-action" form="registerForm">Confimar</button>
    </div>
  </body>
  <script defer>
    const name = document.getElementById("user");

    const email = document.getElementById("mail");
    const pass = document.getElementById("pass");
    const show = document.getElementById("show");
    const submit = document.getElementById("action");
    const confirmation = document.getElementById("pop-up");
    const createBtn = document.getElementById('action');
    const editBtn = document.getElementById('edit');
    const userValue = document.getElementById('userValue');
    const mailValue = document.getElementById('mailValue');
    const passValue = document.getElementById('passValue');
    const registerForm = document.getElementById('registerForm');
    const confirmBtn = document.getElementById('confirm');
    show.addEventListener("click", () => {
      if (pass.type == "password") {
        pass.type = "text";
      } else if (pass.type == "text") {
        pass.type = "password";
      }
    });

    createBtn.addEventListener("click", (e) => {
      e.preventDefault();

      confirmation.style.display="block";
      userValue.innerText = name.value;
      mailValue.innerText = email.value;
      passValue.innerText = pass.value;
    });

  

    editBtn.addEventListener("click", () => {
      confirmation.style.display="none";
    });
  </script>
</html>
