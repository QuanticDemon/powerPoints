<!doctypehhtml>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      body{
        background:rgb(130, 38, 71);
      }

      .form-container{
        background-color: white;
        width: 300px;
        height: 50vh;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 15px;
        text-align: center;
        color: rgb(147, 49, 85);
      }

      form{
        text-align: left;
        color: black;
        font-size: 18px;
        

      }
      form input{
        background-color: rgb(255, 234, 234);
        width: 100%;
        height: 5vh;
        border-radius: 18px;
        padding: 10px;
        font-size: 16px;
        font-weight: 500;
        border:2px rgb(173, 173, 173) solid;
        transition: all 0.3s;
      }

      form input[type='password']{
        width: 80%;
      }
      
      form input:hover{
        background-color: rgb(242, 200, 200);
       
        height: 5vh;
        border-radius: 18px;
        padding: 10px;
        font-size: 16px;
        font-weight: 500;
        border:2px rgb(255, 0, 89) solid;
      }


      form input[type='password']:hover{
        width: 80%;
      }


      #show{
        width: 18%;
        height: 5vh;
        border-radius: 10px;
        background-color: rgb(147, 42, 165);
        border: none;
        color: white;
        transition: all 0.3s;
      }

      #show:hover{
        width: 18%;
        height: 5vh;
        border-radius: 10px;
        background-color: rgb(255, 255, 255);
        border: none;
        color: rgb(182, 105, 255);
        border:1.5px rgb(182, 105, 255) solid;
      }
      
      #login{
        width: 25%;
        height: 5vh;
        border-radius: 10px;
        position: absolute;
        background-color: rgb(165, 42, 122);
        border: none;
        color: white;
        transition: all 0.3s;
        margin-bottom: 10px;
        bottom:3% ;
        left: 70%;
        transform: translate(-3%, -70%);
        
      }

    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>Login</h2>
      <form action="/login" method="post">
      
        <label for="user">Username or mail:</label>
        <br />
        <input type="text" required name="user" />
        <br />
        <label for="password">Enter your password:</label>
        <br />
        <input type="password" required name="pass" id="pass"/>
        <button type="button" id="show">Show</button
        <br />
        <br />
        <button type="submit" name="action" value="loginInto" id="login">Login</button>
      </form>
    </div>
    
    {% if fake == False %}
      <div>
        <p>Something wrong</p>
        
      </div>
    {% endif%}

  </body>
  <script>
      const pass = document.getElementById('pass');
      const show = document.getElementById('show');

      show.addEventListener("click", () => {
        if (pass.type == "password"){
          pass.type = "text";
          pass.style.width = "80%"
        }else if(pass.type == "text"){
          pass.type="password";
        }
      });
  </script>
</html>
